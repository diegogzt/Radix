###############################################################################
# RADIX Application Stack — Local / VPS Deployment
#
# Uso:
#   1. cp .env.example .env  (rellenar con valores reales)
#   2. docker compose up -d --build
#
# Para cambiar de IP a dominio (o entre dominios) solo hay que:
#   - Editar .env con los nuevos valores
#   - docker compose up -d --build   (rebuild necesario para PUBLIC_* del frontend)
###############################################################################

services:
  frontend:
    container_name: radix-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # ⚠️  Estos valores se hornean en el bundle — rebuild requerido al cambiarlos
        PUBLIC_SUPABASE_URL: ${PUBLIC_SUPABASE_URL}
        PUBLIC_SUPABASE_ANON_KEY: ${PUBLIC_SUPABASE_ANON_KEY}
        PUBLIC_API_URL: ${PUBLIC_API_URL}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4321}:4321"
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      NODE_ENV: production

  backend:
    container_name: radix-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    environment:
      # URL de Supabase/Kong — cambiar sin rebuild
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # CORS: orígenes separados por comas
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
