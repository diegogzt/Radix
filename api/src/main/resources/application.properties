spring.application.name=radix
spring.datasource.url=jdbc:mysql://localhost:3306/radix_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=radix_user
spring.datasource.password=radix_password

# Hibernate creará las tablas automáticamente si no existen (ideal para empezar)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8080